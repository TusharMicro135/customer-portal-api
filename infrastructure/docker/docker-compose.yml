name: customer-portal
services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: portal, POSTGRES_USER: portal, POSTGRES_PASSWORD: portal }
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U portal"], interval: 5s, timeout: 3s, retries: 10 }
  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }
volumes: { postgres-data: {} }
