name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"

jobs:
  dependency-audit:
    name: ${{ matrix.ecosystem }} dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ecosystem:
          - npm
          - pnpm
          - pip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: matrix.ecosystem != 'pip'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Set up pnpm
        if: matrix.ecosystem == 'pnpm'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Audit npm workspaces
        if: matrix.ecosystem == 'npm'
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=high

      - name: Audit pnpm workspaces
        if: matrix.ecosystem == 'pnpm'
        run: |
          pnpm install --ignore-scripts --no-frozen-lockfile
          pnpm audit --audit-level=high

      - name: Set up Python
        if: matrix.ecosystem == 'pip'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Audit Python requirements
        if: matrix.ecosystem == 'pip'
        run: |
          python -m pip install pip-audit
          pip-audit -r worker/requirements.txt

  dependency-review:
    name: Review dependency and license changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Block vulnerable or disallowed dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            SSPL-1.0

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
