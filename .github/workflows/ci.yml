name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - devops-modernization-2026-07-02
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  COVERAGE_FLOOR: "60"

jobs:
  legacy-quality:
    name: Legacy ${{ matrix.workspace }} quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - frontend
          - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Restore npm download cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-${{ hashFiles('package.json', 'frontend/package.json', 'backend/package.json', 'shared/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-

      - name: Install legacy workspace dependencies
        run: npm install --no-audit --no-fund

      - name: Add the missing Vitest coverage provider
        if: matrix.workspace == 'frontend'
        run: npm install --no-save --workspace frontend @vitest/coverage-v8@2.1.9

      - name: Lint and type-check
        run: npm run lint --workspace ${{ matrix.workspace }}

      - name: Run tests and enforce 60% coverage
        if: always()
        shell: bash
        run: |
          if [[ "${{ matrix.workspace }}" == "frontend" ]]; then
            npm test --workspace frontend -- \
              --globals \
              --coverage \
              --coverage.provider=v8 \
              --coverage.include='src/**/*.{ts,tsx}' \
              --coverage.thresholds.lines=${COVERAGE_FLOOR} \
              --coverage.thresholds.functions=${COVERAGE_FLOOR} \
              --coverage.thresholds.statements=${COVERAGE_FLOOR} \
              --coverage.thresholds.branches=${COVERAGE_FLOOR}
          else
            npm test --workspace backend -- \
              --coverage \
              --collectCoverageFrom='src/**/*.ts' \
              --coverageThreshold="{\"global\":{\"branches\":${COVERAGE_FLOOR},\"functions\":${COVERAGE_FLOOR},\"lines\":${COVERAGE_FLOOR},\"statements\":${COVERAGE_FLOOR}}}"
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: legacy-${{ matrix.workspace }}-coverage
          path: ${{ matrix.workspace }}/coverage
          if-no-files-found: warn
          retention-days: 14

  modern-quality:
    name: pnpm workspace quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pnpm workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint packages
        shell: bash
        run: |
          status=0
          for package in @portal/admin-web @portal/customer-web @portal/shared-types @portal/shared-utils @portal/api @portal/worker; do
            pnpm --filter "$package" lint || status=1
          done
          exit "$status"

      - name: Type-check packages
        if: always()
        shell: bash
        run: |
          status=0
          for package in @portal/admin-web @portal/customer-web @portal/shared-types @portal/shared-utils @portal/api @portal/worker; do
            pnpm --filter "$package" typecheck || status=1
          done
          exit "$status"

      - name: Run Jest suites and enforce 60% coverage
        if: always()
        shell: bash
        run: |
          threshold="{\"global\":{\"branches\":${COVERAGE_FLOOR},\"functions\":${COVERAGE_FLOOR},\"lines\":${COVERAGE_FLOOR},\"statements\":${COVERAGE_FLOOR}}}"
          status=0
          for package in @portal/shared-utils @portal/api @portal/worker; do
            pnpm --filter "$package" exec jest --coverage --coverageThreshold="$threshold" || status=1
          done

          for app in apps/admin-web apps/customer-web; do
            if ! find "$app" -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' \) -print -quit | grep -q .; then
              echo "::error file=$app::No test files exist for this frontend application."
              status=1
            fi
          done
          exit "$status"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: modern-workspace-coverage
          path: |
            apps/*/coverage
            services/*/coverage
            packages/*/coverage
          if-no-files-found: warn
          retention-days: 14

  python-quality:
    name: Python worker and scheduled job quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install Python dependencies and test tools
        run: python -m pip install -r worker/requirements.txt pytest pytest-cov ruff

      - name: Lint Python
        run: ruff check worker jobs

      - name: Run tests and enforce 60% coverage
        if: always()
        env:
          PYTHONPATH: worker
        run: >-
          pytest worker/tests -q
          --cov=worker
          --cov=jobs
          --cov-report=term-missing
          --cov-report=xml:coverage-python.xml
          --cov-fail-under=${{ env.COVERAGE_FLOOR }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: python-coverage
          path: coverage-python.xml
          if-no-files-found: warn
          retention-days: 14

  build-artifacts:
    name: Build once and publish reusable artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Restore npm download cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-${{ hashFiles('package.json', 'frontend/package.json', 'backend/package.json', 'shared/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-

      - name: Build the npm workspaces
        run: |
          npm install --no-audit --no-fund
          npm run build --workspace frontend
          npm run build --workspace backend

      - name: Build the pnpm workspaces
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --recursive --if-present run build

      - name: Upload build outputs
        uses: actions/upload-artifact@v6
        with:
          name: application-build-${{ github.sha }}
          path: |
            frontend/dist
            backend/dist
            apps/*/.next
            services/*/dist
            packages/*/dist
          if-no-files-found: error
          retention-days: 7

  artifact-smoke-test:
    name: Verify the reusable build artifact
    needs: build-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download build outputs
        uses: actions/download-artifact@v6
        with:
          name: application-build-${{ github.sha }}
          path: build

      - name: Verify artifact content without rebuilding
        run: |
          test -n "$(find build -type f -print -quit)"
          find build -maxdepth 4 -type f | sort
