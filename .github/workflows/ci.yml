name: CI

on:
  push:
    branches: [main]

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint --workspaces --if-present

  test:
    runs-on: ubuntu-latest
    needs: lint-and-install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test --workspaces --if-present
